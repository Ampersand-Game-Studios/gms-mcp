name: Post to X

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: write  # Needed to delete old cache

concurrency:
  group: x-posting-main
  cancel-in-progress: false

jobs:
  post:
    # Only run in the real repo, not forks
    if: github.repository == 'Ampersand-Game-Studios/gms-mcp'
    # GitHub-hosted runner IPs are intermittently challenged by X/Cloudflare.
    runs-on: [self-hosted, macOS, ARM64, gms-mcp-x]
    timeout-minutes: 5
    env:
      PYTHON_BIN: /Users/callum/.local/share/actions-runner-gms-mcp-x/x-posting-venv/bin/python
    steps:
      - uses: actions/checkout@v4

      - name: Restore tweet history from cache
        uses: actions/cache/restore@v4
        id: cache-restore
        with:
          path: .github/tweet_history.json
          key: tweet-history-${{ github.run_id }}
          restore-keys: |
            tweet-history-

      - name: Install dependencies
        # The self-hosted runner venv is pre-provisioned with requests-oauthlib.
        run: $PYTHON_BIN -c "import requests, requests_oauthlib"

      - name: Post to X
        id: post
        env:
          X_APP_KEY: ${{ secrets.X_APP_KEY }}
          X_APP_SECRET: ${{ secrets.X_APP_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: $PYTHON_BIN -u .github/scripts/post_tweet.py

      - name: Delete old cache
        if: always() && steps.cache-restore.outputs.cache-matched-key
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh cache delete "${{ steps.cache-restore.outputs.cache-matched-key }}" --repo ${{ github.repository }} || true

      - name: Save tweet history to cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: .github/tweet_history.json
          key: tweet-history-${{ github.run_id }}
