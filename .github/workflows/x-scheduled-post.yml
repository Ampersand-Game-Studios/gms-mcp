name: Scheduled X Post

on:
  schedule:
    # 8am UTC, 2pm UTC, 8pm UTC
    - cron: '0 8 * * *'
    - cron: '0 14 * * *'
    - cron: '0 20 * * *'
  workflow_dispatch: # Manual trigger for testing

permissions:
  contents: read
  actions: write  # Needed to delete old cache

concurrency:
  group: x-posting-main
  cancel-in-progress: false

jobs:
  generate-and-post:
    # Only run in the real repo, not forks
    if: github.repository == 'Ampersand-Game-Studios/gms-mcp' && vars.X_SCHEDULED_PAUSED != 'true'
    # GitHub-hosted runner IPs are intermittently challenged by X/Cloudflare.
    runs-on: [self-hosted, macOS, ARM64, gms-mcp-x]
    timeout-minutes: 10
    env:
      PYTHON_BIN: /Users/callum/.local/share/actions-runner-gms-mcp-x/x-posting-venv/bin/python
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Restore tweet history from cache
        uses: actions/cache/restore@v4
        id: cache-restore
        with:
          path: .github/tweet_history.json
          key: tweet-history-${{ github.run_id }}
          restore-keys: |
            tweet-history-

      - name: Install dependencies
        # The self-hosted runner venv is pre-provisioned with requests-oauthlib and anthropic.
        run: $PYTHON_BIN -c "import anthropic, requests, requests_oauthlib"

      - name: Generate tweet with Claude
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          "$PYTHON_BIN" .github/scripts/generate_tweet.py
          TOPIC=$("$PYTHON_BIN" -c "import json; h=json.load(open('.github/tweet_history.json')); print(h.get('topic_coverage',{}).keys().__iter__().__next__() if h else '')" 2>/dev/null || echo "")
          echo "topic=$TOPIC" >> $GITHUB_OUTPUT

      - name: Post to X
        id: post
        if: steps.generate.outputs.tweet_generated == 'true'
        env:
          X_APP_KEY: ${{ secrets.X_APP_KEY }}
          X_APP_SECRET: ${{ secrets.X_APP_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          TWEET_TOPIC: ${{ steps.generate.outputs.topic }}
          TWEET_FORMAT: ${{ steps.generate.outputs.format }}
          TWEET_GENERATED_BY: claude-api
        run: $PYTHON_BIN -u .github/scripts/post_tweet.py

      - name: Delete old cache
        if: always() && steps.cache-restore.outputs.cache-matched-key
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh cache delete "${{ steps.cache-restore.outputs.cache-matched-key }}" --repo ${{ github.repository }} || true

      - name: Save tweet history to cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: .github/tweet_history.json
          key: tweet-history-${{ github.run_id }}
